name: Release plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version without a leading v"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: macos-14
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Use upstream CLIProxyAPI SDK
        run: |
          go mod edit -replace github.com/router-for-me/CLIProxyAPI/v7=github.com/router-for-me/CLIProxyAPI/v7@main
          go mod tidy

      - name: Build release archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ -z "${version}" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          ./scripts/package-release.sh "${version}"

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          find artifacts -name checksums.txt -exec cat {} \; > release/checksums.unsorted.txt
          sort -u release/checksums.unsorted.txt > release/checksums.txt
          rm release/checksums.unsorted.txt
          ls -la release

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="v${{ github.event.inputs.version }}"
          fi
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release/* --clobber
          else
            gh release create "${tag}" release/* --title "${tag}" --notes "CLIProxyAPI plugin release ${tag}"
          fi
